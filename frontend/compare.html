<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ResearchMind — Compare</title>
<link rel="stylesheet" href="css/main.css">
<style>
  .compare-layout { max-width: 760px; }

  .papers-multiselect {
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 4px 16px;
    margin-bottom: 16px;
  }

  .multiselect-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 13px 0;
    cursor: pointer;
    border-bottom: 1px solid var(--border);
    font-size: 13.5px;
  }

  .multiselect-item:last-child { border-bottom: none; }

  .multiselect-item input {
    accent-color: var(--pine-bright);
    width: 15px;
    height: 15px;
  }

  .selected-count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11.5px;
    color: var(--clay);
    margin-bottom: 24px;
    display: block;
  }

  .results-area { margin-top: 24px; }
</style>
</head>
<body>

<nav class="navbar">
  <a href="index.html" class="navbar-brand">
    <span class="navbar-mark"></span>
    <span class="navbar-title">ResearchMind</span>
  </a>
  <ul class="navbar-nav">
    <li><a href="index.html">Library</a></li>
    <li><a href="chat.html">Ask</a></li>
    <li><a href="analyze.html">Analyze</a></li>
    <li><a href="compare.html" class="active">Compare</a></li>
  </ul>
</nav>

<div class="main-content">
  <div class="container">

    <div class="page-header">
      <div class="eyebrow">Read across papers</div>
      <h1>Compare &amp; find gaps</h1>
      <p>Select two or more papers to compare side by side, or analyze one collection for what's still unanswered.</p>
    </div>

    <div class="compare-layout">

      <div class="papers-multiselect" id="papers-multiselect-container">
        <div class="empty-state" style="padding:24px 0;">
          <p>Loading papers...</p>
        </div>
      </div>

      <span class="selected-count" id="selected-count">0 selected</span>

      <div class="tabs">
        <button class="tab active" onclick="switchMode('compare')" id="tab-compare">Compare papers</button>
        <button class="tab" onclick="switchMode('gaps')" id="tab-gaps">Find research gaps</button>
      </div>

      <button class="btn btn-primary" id="action-btn" onclick="handleAction()" style="width:100%;">
        Compare selected papers
      </button>

      <div class="results-area" id="results-area"></div>

    </div>

  </div>
</div>

<script src="js/api.js"></script>
<script src="js/compare.js"></script>
</body>
</html>
